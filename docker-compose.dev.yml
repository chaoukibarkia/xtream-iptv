# ============================================
# IPTV System - Development Docker Compose
# ============================================
# Run: docker compose -f docker-compose.dev.yml up -d
# This only runs infrastructure (PostgreSQL, Redis)
# Run frontend/backend locally with npm run dev
# ============================================

version: '3.7'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=iptv
      - POSTGRES_PASSWORD=iptv_secret
      - POSTGRES_DB=iptv_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iptv -d iptv_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # Adminer - Database Management UI
  # ==========================================
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres

  # ==========================================
  # Redis Commander - Redis Management UI
  # ==========================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  postgres-data:
  redis-data:

