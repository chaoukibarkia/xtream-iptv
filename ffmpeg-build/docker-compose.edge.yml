# ============================================
# IPTV Edge Server with NVIDIA GPU Support
# ============================================
# Deploy this on edge servers with NVIDIA GPUs
# for hardware-accelerated transcoding
# ============================================

version: '3.7'

services:
  edge-server:
    build:
      context: ..
      dockerfile: ffmpeg-build/Dockerfile.edge-server
    image: iptv-edge-server:nvidia
    container_name: iptv-edge
    runtime: nvidia
    environment:
      # Server Configuration
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3001
      
      # Main Panel Connection
      - MAIN_PANEL_URL=${MAIN_PANEL_URL:-http://main-panel:3001}
      - SERVER_API_KEY=${SERVER_API_KEY}
      
      # This Server Info
      - SERVER_NAME=${SERVER_NAME:-edge-01}
      - SERVER_TYPE=EDGE
      - EXTERNAL_IP=${EXTERNAL_IP}
      - INTERNAL_IP=${INTERNAL_IP:-0.0.0.0}
      - HTTP_PORT=3001
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-5000}
      
      # FFmpeg Configuration
      - FFMPEG_PATH=/opt/ffmpeg/bin/ffmpeg
      - FFPROBE_PATH=/opt/ffmpeg/bin/ffprobe
      
      # Hardware Acceleration
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      
      # Transcoding Defaults
      - DEFAULT_VIDEO_CODEC=h264_nvenc
      - DEFAULT_AUDIO_CODEC=aac
      - ENABLE_HARDWARE_DECODE=true
      - ENABLE_HARDWARE_ENCODE=true
      
      # Redis (optional, for caching)
      - REDIS_URL=${REDIS_URL:-}
      
      # Database (connect to main panel's database)
      - DATABASE_URL=${DATABASE_URL}
      
      # JWT Secret (must match main panel)
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "3001:3001"
      - "1935:1935"  # RTMP if needed
    volumes:
      - hls-segments:/tmp/hls-segments
      - logs:/var/log/iptv
      - cache:/var/cache/iptv
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video, compute]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  hls-segments:
  logs:
  cache:

